<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CICADA Box Job Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: dark;
    --bg: #050505;
    --panel: #111;
    --border: #333;
    --text: #f3f3f3;
    --muted: #aaa;
    --good: #9fffa8;
    --warn: #ffd479;
    --bad: #ff8f8f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, Segoe UI, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px;
  }
  h1 { margin: 0 0 8px; letter-spacing: .04em; }
  .sub { color: var(--muted); margin-bottom: 24px; }
  .grid {
    display: grid;
    grid-template-columns: minmax(280px, 420px) 1fr;
    gap: 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  label {
    display: block;
    margin: 12px 0 4px;
    color: var(--muted);
    font-size: 14px;
  }
  input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 9px;
    border: 1px solid #444;
    background: #070707;
    color: var(--text);
  }
  textarea { min-height: 78px; }
  button {
    margin-top: 12px;
    padding: 11px 14px;
    border: 1px solid #555;
    border-radius: 10px;
    background: #fff;
    color: #000;
    font-weight: 700;
    cursor: pointer;
  }
  button.secondary {
    background: #181818;
    color: var(--text);
  }
  pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #050505;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 14px;
    min-height: 320px;
  }
  .status {
    margin-top: 12px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #333;
  }
  .good { color: var(--good); }
  .warn { color: var(--warn); }
  .bad { color: var(--bad); }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .small { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<main>
  <h1>CICADA BOX JOB EDITOR</h1>
  <div class="sub">Editable job JSON for STL generation. It downloads a job file. It does not send anything to a printer, because apparently we are being adults today.</div>

  <div class="grid">
    <section class="panel">
      <label>Job name</label>
      <input id="name" value="custom_box">

      <div class="row">
        <div>
          <label>Width mm</label>
          <input id="width" type="number" step="0.1" value="80">
        </div>
        <div>
          <label>Depth mm</label>
          <input id="depth" type="number" step="0.1" value="40">
        </div>
        <div>
          <label>Height mm</label>
          <input id="height" type="number" step="0.1" value="12">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Material</label>
          <select id="material">
            <option>PLA</option>
            <option>PETG</option>
            <option>ABS</option>
            <option>TPU</option>
          </select>
        </div>
        <div>
          <label>Layer height mm</label>
          <input id="layer" type="number" step="0.01" value="0.20">
        </div>
        <div>
          <label>Walls</label>
          <input id="walls" type="number" step="1" value="3">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Infill %</label>
          <input id="infill" type="number" step="1" value="15">
        </div>
        <div>
          <label>Supports</label>
          <select id="supports">
            <option>off</option>
            <option>on</option>
            <option>tree</option>
          </select>
        </div>
        <div>
          <label>Preset</label>
          <select id="preset" onchange="applyPreset()">
            <option value="">custom</option>
            <option value="20,20,10,PLA,0.20,3,15,off,test_block">test block</option>
            <option value="80,40,4,PLA,0.20,3,20,off,thin_plate">thin plate</option>
            <option value="80,40,12,PETG,0.24,3,15,off,box_80x40x12">default box</option>
          </select>
        </div>
      </div>

      <label>Note</label>
      <textarea id="note">Generated from CICADA local box job editor.</textarea>

      <button onclick="downloadJob()">Download job JSON</button>
      <button class="secondary" onclick="copyCommand()">Copy run command</button>

      <div id="status" class="status small">Generic printer volume check: waiting.</div>
    </section>

    <section class="panel">
      <h2>Job JSON preview</h2>
      <pre id="preview"></pre>
      <h2>Run command</h2>
      <pre id="command"></pre>
    </section>
  </div>
</main>

<script>
const repo = "C:\\\\CICADA\\\\CICADA_APPS\\\\CICADA_FORGE_UE";
const generic = { width: 220, depth: 220, height: 250 };

function v(id) { return document.getElementById(id).value; }
function n(id) { return Number(v(id)); }

function safeName(name) {
  return (name || "custom_box").replace(/[^a-z0-9_-]+/gi, "_").replace(/^_+|_+$/g, "") || "custom_box";
}

function job() {
  return {
    name: safeName(v("name")),
    box_mm: {
      width: n("width"),
      depth: n("depth"),
      height: n("height")
    },
    material: v("material"),
    layer_height_mm: n("layer"),
    walls: Math.floor(n("walls")),
    infill_percent: Math.floor(n("infill")),
    supports: v("supports"),
    note: v("note"),
    direct_printer_send: false,
    machine_bridge: "LOCKED"
  };
}

function validate(j) {
  const dims = j.box_mm;
  const positive = dims.width > 0 && dims.depth > 0 && dims.height > 0;
  const fits = dims.width <= generic.width && dims.depth <= generic.depth && dims.height <= generic.height;
  const infill = j.infill_percent >= 0 && j.infill_percent <= 100;
  return { positive, fits, infill, ok: positive && fits && infill };
}

function render() {
  const j = job();
  const result = validate(j);
  document.getElementById("preview").textContent = JSON.stringify(j, null, 2);
  document.getElementById("command").textContent =
`powershell -ExecutionPolicy Bypass -File "${repo}\\\\scripts\\\\run_box_job.ps1" -Job "Saved\\\\CICADAForge\\\\BoxJobs\\\\${j.name}.json"`;

  const s = document.getElementById("status");
  s.className = "status small " + (result.ok ? "good" : "bad");
  s.textContent = result.ok
    ? "PASS: dimensions are positive, infill is valid, and box fits 220 x 220 x 250 mm."
    : "FAIL/WARN: fix dimensions, infill, or build volume before generating STL.";
}

function downloadJob() {
  const j = job();
  const blob = new Blob([JSON.stringify(j, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${j.name}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function copyCommand() {
  await navigator.clipboard.writeText(document.getElementById("command").textContent);
}

function applyPreset() {
  const p = v("preset");
  if (!p) return;
  const [w,d,h,mat,layer,walls,infill,supports,name] = p.split(",");
  document.getElementById("width").value = w;
  document.getElementById("depth").value = d;
  document.getElementById("height").value = h;
  document.getElementById("material").value = mat;
  document.getElementById("layer").value = layer;
  document.getElementById("walls").value = walls;
  document.getElementById("infill").value = infill;
  document.getElementById("supports").value = supports;
  document.getElementById("name").value = name;
  render();
}

document.querySelectorAll("input, select, textarea").forEach(el => el.addEventListener("input", render));
render();
</script>
</body>
</html>
